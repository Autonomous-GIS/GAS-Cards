<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Store (Registry + Search)</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --btn-bg: #f0f0f5;
            --btn-hover: #e4e4eb;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin: 0;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-secondary);
            margin: 8px 0 0 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            height: 360px;
            min-height: 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.08);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon {
            width: 68px;
            height: 68px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        .icon-vector { background: linear-gradient(135deg, #FF9500, #FF5E3A); }
        .icon-raster { background: linear-gradient(135deg, #34C759, #28A745); }
        .icon-pasda { background: linear-gradient(135deg, #007AFF, #0056B3); }
        .icon-mapping { background: linear-gradient(135deg, #AF52DE, #8944AB); }
        .icon-projection { background: linear-gradient(135deg, #FF2D55, #D92045); }
        .icon-retriever { background: linear-gradient(135deg, #5AC8FA, #3DA2C8); }

        .title-group {
            flex: 1;
        }

        .title {
            font-size: 19px;
            font-weight: 600;
            margin: 0;
            line-height: 1.2;
        }

        .version {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 4px 0 0 0;
            font-weight: 500;
        }

        .get-btn {
            background-color: var(--btn-bg);
            color: var(--accent-color);
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .get-btn:hover {
            background-color: var(--btn-hover);
        }

        .description {
            font-size: 15px;
            line-height: 1.45;
            color: #515154;
            margin: 0;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            overflow-wrap: anywhere;
            word-break: break-word;
            padding-right: 6px;
            scrollbar-width: thin;
            scrollbar-color: #c7c7cc transparent;
        }
        .description::-webkit-scrollbar { width: 6px; }
        .description::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 3px; }
        .description::-webkit-scrollbar-track { background: transparent; }

        .divider {
            height: 1px;
            background-color: #e5e5ea;
            margin: 4px 0;
        }

        .citation {
            font-size: 11px;
            color: #a1a1a6;
            margin-top: auto;
            word-break: break-all;
        }

        .citation a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .citation a:hover {
            text-decoration: underline;
        }

        .api-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .api-link {
            display: inline-block;
            text-decoration: none;
            background-color: var(--btn-bg);
            color: var(--accent-color);
            border-radius: 12px;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .api-link:hover {
            background-color: var(--btn-hover);
        }

        .title.clickable { cursor: pointer; transition: color 0.2s ease; }
        .title.clickable:hover { color: var(--accent-color); }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
            z-index: 1000;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            max-width: 720px; width: 100%;
            max-height: 85vh; overflow-y: auto;
            padding: 32px 36px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            -webkit-overflow-scrolling: touch;
        }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            background: var(--btn-bg); border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 18px; line-height: 1; cursor: pointer;
            color: var(--text-primary);
        }
        .modal-close:hover { background: var(--btn-hover); }
        .modal-title { font-size: 26px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.01em; }
        .modal-meta { font-size: 13px; color: var(--text-secondary); margin: 0 0 20px; }
        .modal-description { font-size: 16px; line-height: 1.55; color: #333; margin: 0; overflow-wrap: anywhere; word-break: break-word; }
        .modal-section { margin-top: 24px; }
        .modal-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); margin: 0 0 10px; font-weight: 600; }
        .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .modal-tag { background: var(--btn-bg); color: #1d1d1f; border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 500; }
        .modal-skill { padding: 12px 0; border-top: 1px solid #e5e5ea; }
        .modal-skill:first-child { border-top: none; padding-top: 0; }
        .modal-skill-name { font-weight: 600; margin: 0 0 4px; font-size: 15px; }
        .modal-skill-desc { font-size: 14px; color: #515154; margin: 0; line-height: 1.45; }
        .modal-link { display: inline-block; margin-top: 4px; color: var(--accent-color); font-weight: 600; font-size: 13px; text-decoration: none; }
        .modal-link:hover { text-decoration: underline; }

        /* Action bar (search + register) */
        .action-bar {
            max-width: 1200px;
            margin: 0 auto 24px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1 1 240px;
            max-width: 420px;
            padding: 10px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            font-size: 15px;
            background: #fff;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
        }
        .primary-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.05s ease;
        }
        .primary-btn:hover { background: #0064d6; }
        .primary-btn:active { transform: translateY(1px); }
        .primary-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        /* Registration modal form */
        .form-row { margin: 0 0 14px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin: 0 0 6px; }
        .form-input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 14px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }
        .form-hint { font-size: 12px; color: var(--text-secondary); margin: 4px 0 0; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .secondary-btn {
            background: var(--btn-bg); color: var(--text-primary);
            border: none; border-radius: 12px;
            padding: 10px 18px; font-size: 15px; font-weight: 600;
            cursor: pointer;
        }
        .secondary-btn:hover { background: var(--btn-hover); }
        .form-status {
            margin-top: 12px;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 10px;
            display: none;
        }
        .form-status.info    { display: block; background: #eaf3ff; color: #0c5fc7; }
        .form-status.success { display: block; background: #e6f6ec; color: #1f7a3f; }
        .form-status.error   { display: block; background: #fdecec; color: #b3261e; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-size: 15px;
        }
    </style>
    <script>
        (function routeGasRequest() {
            var currentJsonFilename = "gas-response.json";

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            var jsonNodeCounter = 0;

            function getIndent(depth) {
                return new Array(depth + 1).join("  ");
            }

            function formatKey(key) {
                return typeof key === "string" ? "<span class=\"json-key\">\"" + escapeHtml(key) + "\"</span>: " : "";
            }

            function formatPrimitive(value) {
                if (value === null) {
                    return "<span class=\"json-type-null\">null</span>";
                }
                if (typeof value === "string") {
                    return "<span class=\"json-type-string\">\"" + escapeHtml(value) + "\"</span>";
                }
                if (typeof value === "number") {
                    return "<span class=\"json-type-number\">" + String(value) + "</span>";
                }
                if (typeof value === "boolean") {
                    return "<span class=\"json-type-boolean\">" + String(value) + "</span>";
                }
                return "<span class=\"json-type-undefined\">undefined</span>";
            }

            function renderJsonNode(value, key, depth, isLast, isRoot) {
                var container = document.createElement("div");
                var keyPrefix = formatKey(key);
                var comma = isLast ? "" : ",";
                var indent = getIndent(depth);

                if (value === null || typeof value !== "object") {
                    var primitiveLine = document.createElement("div");
                    primitiveLine.className = "json-line";
                    primitiveLine.innerHTML =
                        escapeHtml(indent) +
                        "<span class=\"json-toggle-slot\"></span>" +
                        keyPrefix +
                        formatPrimitive(value) +
                        comma;
                    container.appendChild(primitiveLine);
                    return container;
                }

                var isArray = Array.isArray(value);
                var keys = isArray ? value.map(function(_, i) { return i; }) : Object.keys(value);
                var openChar = isArray ? "[" : "{";
                var closeChar = isArray ? "]" : "}";

                if (keys.length === 0) {
                    var emptyLine = document.createElement("div");
                    emptyLine.className = "json-line";
                    emptyLine.innerHTML =
                        escapeHtml(indent) +
                        "<span class=\"json-toggle-slot\"></span>" +
                        keyPrefix +
                        openChar +
                        closeChar +
                        comma;
                    container.appendChild(emptyLine);
                    return container;
                }

                var nodeId = "json-node-" + (jsonNodeCounter++);
                var headerLine = document.createElement("div");
                headerLine.className = "json-line";
                headerLine.innerHTML =
                    escapeHtml(indent) +
                    "<span class=\"json-toggle-slot\"><button type=\"button\" class=\"json-toggle\" data-target=\"" + nodeId + "\" aria-expanded=\"true\">▼</button></span>" +
                    keyPrefix +
                    openChar;
                container.appendChild(headerLine);

                var children = document.createElement("div");
                children.id = nodeId;
                children.className = "json-children";
                keys.forEach(function(childKey, index) {
                    children.appendChild(
                        renderJsonNode(value[childKey], isArray ? null : String(childKey), depth + 1, index === keys.length - 1, false)
                    );
                });
                container.appendChild(children);

                var closingLine = document.createElement("div");
                closingLine.className = "json-line";
                closingLine.innerHTML = escapeHtml(indent) + "<span class=\"json-toggle-slot\"></span>" + closeChar + comma;
                container.appendChild(closingLine);

                if (isRoot) {
                    container.classList.add("json-root");
                }

                return container;
            }

            function renderJson(payload) {
                document.title = "GAS API Response";
                document.documentElement.innerHTML =
                    "<head><meta charset=\"UTF-8\"><title>GAS API Response</title></head>" +
                    "<body>" +
                    "<div class=\"json-page\">" +
                    "<div class=\"json-toolbar\">" +
                    "<button id=\"download-json\" type=\"button\">Download JSON</button>" +
                    "</div>" +
                    "<div id=\"json-viewer\" class=\"json-viewer\"></div>" +
                    "</div>" +
                    "</body>";

                var style = document.createElement("style");
                style.textContent = [
                    "body{margin:0;padding:16px;background:#ffffff;color:#111111;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}",
                    ".json-page{max-width:1200px;margin:0 auto;}",
                    ".json-toolbar{display:flex;justify-content:flex-end;margin-bottom:12px;}",
                    "#download-json{border:1px solid #d2d2d7;background:#f5f5f7;color:#1d1d1f;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;}",
                    "#download-json:hover{background:#ebebf0;}",
                    ".json-viewer{border:1px solid #e5e5ea;border-radius:10px;padding:12px;line-height:1.5;}",
                    ".json-line{padding:1px 0;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;}",
                    ".json-children{margin:0;}",
                    ".json-toggle-slot{display:inline-block;width:14px;text-align:left;}",
                    ".json-toggle{border:none;background:transparent;color:#007aff;cursor:pointer;padding:0;font-size:11px;line-height:1;vertical-align:middle;width:14px;text-align:left;}",
                    ".json-key{color:#1d1d1f;}",
                    ".json-meta{color:#007aff;}",
                    ".json-type-string{color:#0a7f42;}",
                    ".json-type-number{color:#b25000;}",
                    ".json-type-boolean{color:#7b2cbf;}",
                    ".json-type-null{color:#8e8e93;}",
                    ".json-type-undefined{color:#8e8e93;}"
                ].join("");
                document.head.appendChild(style);

                var viewer = document.getElementById("json-viewer");
                viewer.appendChild(renderJsonNode(payload, null, 0, true, true));

                viewer.addEventListener("click", function(event) {
                    var toggle = event.target;
                    if (!toggle.classList.contains("json-toggle")) {
                        return;
                    }
                    var targetId = toggle.getAttribute("data-target");
                    var target = document.getElementById(targetId);
                    if (!target) {
                        return;
                    }
                    var isHidden = target.style.display === "none";
                    target.style.display = isHidden ? "block" : "none";
                    toggle.textContent = isHidden ? "▼" : "▶";
                    toggle.setAttribute("aria-expanded", isHidden ? "true" : "false");
                });

                document.getElementById("download-json").addEventListener("click", function() {
                    var jsonText = JSON.stringify(payload, null, 2);
                    var blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
                    var url = URL.createObjectURL(blob);
                    var link = document.createElement("a");
                    link.href = url;
                    link.download = currentJsonFilename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                });
            }

            function renderErrorJson(errorMessage, details) {
                var payload = {
                    ok: false,
                    error: errorMessage
                };

                if (details) {
                    payload.details = details;
                }

                renderJson(payload);
            }

            function respondWithJsonFile(filePath) {
                var matchedName = String(filePath || "").match(/[^\\/]+$/);
                currentJsonFilename = matchedName ? matchedName[0] : "gas-response.json";
                fetch(filePath, { cache: "no-store" })
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(function(data) {
                        renderJson(data);
                    })
                    .catch(function(err) {
                        renderErrorJson("Requested JSON resource is unavailable.", String(err && err.message ? err.message : err));
                    });
            }

            var params = new URLSearchParams(window.location.search);
            var request = (params.get("REQUEST") || "").toLowerCase();
            var agent = (params.get("name") || params.get("agent") || "").toLowerCase();
            var service = (params.get("SERVICE") || "").toUpperCase();

            // Keep normal page rendering when URL is not API-style.
            if (!request) {
                return;
            }

            if (service && service !== "GAS") {
                renderErrorJson("Invalid SERVICE parameter.", "Expected SERVICE=GAS.");
                return;
            }

            if (request === "getcapabilities") {
                respondWithJsonFile("ServiceCapabilities/gas_capabilities.json");
                return;
            }

            if (request === "describeagent" && agent) {
                respondWithJsonFile("ServiceCapabilities/" + agent + ".json");
                return;
            }

            if (request === "describeagent" && !agent) {
                renderErrorJson("Missing required agent parameter.", "Provide ?agent=<agent_name> for DescribeAgent.");
                return;
            }

            renderErrorJson("Invalid REQUEST parameter.", "Supported values: GetCapabilities, DescribeAgent.");
        })();
    </script>
</head>
<body>

    <header>
        <h1>GAS Store</h1>
        <h2>Published Geospatial Agentic Services in the GAS Registry</h2>
    </header>

    <div class="action-bar">
        <input id="search-input" class="search-input" type="search" placeholder="Search agents by name, description, or tag…" autocomplete="off">
        <button id="register-btn" class="primary-btn" type="button">Register GAS Server</button>
    </div>

    <main class="container" id="agent-cards">
        <p id="agent-cards-status" style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary);">Loading agents…</p>
    </main>

    <script>
        (function loadAgentCards() {
            // Skip if the page is rendering an API JSON response.
            var params = new URLSearchParams(window.location.search);
            if (params.get("REQUEST")) {
                return;
            }

            var CAPABILITIES_URL = "https://www.geospatial-agentic-services.online/?SERVICE=GAS&VERSION=1.0.0&REQUEST=GetCapabilities";

            // Presentation-only mapping for icon styles + emoji, keyed by agent slug.
            // New agents fall back to a default style.
            var ICON_MAP = {
                vector_analysis_agent: { cls: "icon-vector",     emoji: "📐" }, // 📐
                raster_agent:          { cls: "icon-raster",     emoji: "🏔️" }, // 🏔️
                pasda_agent:           { cls: "icon-pasda",      emoji: "🔍" }, // 🔍
                mapping_agent:         { cls: "icon-mapping",    emoji: "📍" }, // 📍
                map_projection_agent:  { cls: "icon-projection", emoji: "🌐" }, // 🌐
                data_retriever_agent:  { cls: "icon-retriever",  emoji: "📥" }  // 📥
            };
            var DEFAULT_ICON = { cls: "icon-vector", emoji: "✨" };

            function escapeHtml(value) {
                return String(value == null ? "" : value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            //  Convert e.g "vector_analysis_agent" -> "VectorAnalysisAgent"
            function toDisplayTitle(slug) {
                return String(slug || "")
                    .split("_")
                    .filter(Boolean)
                    .map(function(p) { return p.charAt(0).toUpperCase() + p.slice(1); })
                    .join("");
            }

            function fetchJson(url) {
                return fetch(url, { cache: "no-store" }).then(function(r) {
                    if (!r.ok) { throw new Error("HTTP " + r.status + " for " + url); }
                    return r.json();
                });
            }

            // ---- Modal (one shared instance) ----
            var modalOverlay = document.createElement("div");
            modalOverlay.className = "modal-overlay";
            var modalContent = document.createElement("div");
            modalContent.className = "modal-content";
            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);

            function closeModal() {
                modalOverlay.classList.remove("open");
                document.body.style.overflow = "";
            }
            modalOverlay.addEventListener("click", function(e) {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener("keydown", function(e) {
                if (e.key === "Escape") closeModal();
            });

            function tagsHtml(values) {
                return values.map(function(t) {
                    return '<span class="modal-tag">' + escapeHtml(t) + '</span>';
                }).join("");
            }

            function openModal(agentEntry, detail) {
                var profile = (detail && detail.profile) || {};
                var slug = profile.name || agentEntry.name || "";
                var title = toDisplayTitle(slug);
                var version = profile.version || "";
                var status = profile.status || "";
                var lastUpdated = profile.last_updated || "";
                var description = profile.description || "";
                var provider = profile.provider || {};
                var contact = provider.contact || {};

                var dataSupport = (detail && detail.data_support) || {};
                var formats = dataSupport.supported_formats || [];
                var dataTypes = dataSupport.supported_data_types || [];
                var combinedFormats = formats.concat(dataTypes.filter(function(t){ return formats.indexOf(t) === -1; }));

                var skills = (detail && detail.skills) || [];

                var metaParts = [];
                if (version) metaParts.push("Version " + escapeHtml(version));
                if (status) metaParts.push(escapeHtml(status));
                if (lastUpdated) metaParts.push("Updated " + escapeHtml(lastUpdated));

                var html =
                    '<button class="modal-close" type="button" aria-label="Close">×</button>' +
                    '<h2 class="modal-title">' + escapeHtml(title) + '</h2>' +
                    (metaParts.length ? '<p class="modal-meta">' + metaParts.join(" · ") + '</p>' : '') +
                    '<p class="modal-description">' + escapeHtml(description) + '</p>';

                if (combinedFormats.length) {
                    html += '<div class="modal-section"><h4>Supported formats</h4>' +
                        '<div class="modal-tags">' + tagsHtml(combinedFormats) + '</div></div>';
                }

                if (skills.length) {
                    html += '<div class="modal-section"><h4>Skills</h4>';
                    skills.forEach(function(s) {
                        html += '<div class="modal-skill">' +
                            '<p class="modal-skill-name">' + escapeHtml(s.name || s.id || "") + '</p>' +
                            '<p class="modal-skill-desc">' + escapeHtml(s.description || "") + '</p>' +
                            '</div>';
                    });
                    html += '</div>';
                }

                if (provider.name || contact.email) {
                    html += '<div class="modal-section"><h4>Provider</h4>' +
                        '<p class="modal-skill-desc">' + escapeHtml(provider.name || "") +
                        (contact.name ? ' — ' + escapeHtml(contact.name) : '') +
                        (contact.email ? ' (<a class="modal-link" href="mailto:' + escapeHtml(contact.email) + '">' + escapeHtml(contact.email) + '</a>)' : '') +
                        '</p></div>';
                }

                if (agentEntry.describeUrl) {
                    html += '<div class="modal-section">' +
                        '<a class="modal-link" href="' + escapeHtml(agentEntry.describeUrl) + '" target="_blank" rel="noopener">View full DescribeAgent JSON →</a>' +
                        '</div>';
                }

                modalContent.innerHTML = html;
                modalContent.querySelector(".modal-close").addEventListener("click", closeModal);
                modalContent.scrollTop = 0;
                modalOverlay.classList.add("open");
                document.body.style.overflow = "hidden";
            }
            // ---- /Modal ----

            function renderCard(agentEntry, detail) {
                var slug = (detail && detail.profile && detail.profile.name) || agentEntry.name || "";
                var icon = ICON_MAP[slug] || DEFAULT_ICON;
                var title = toDisplayTitle(slug);
                var version = (detail && detail.profile && detail.profile.version) || "";
                var description = (detail && detail.profile && detail.profile.description) || "";
                var describeUrl = agentEntry.describeUrl || "";
                var hasDetail = !!(detail && detail.profile);

                var article = document.createElement("article");
                article.className = "card";
                article.innerHTML =
                    '<div class="card-header">' +
                        '<div class="icon ' + escapeHtml(icon.cls) + '">' + icon.emoji + '</div>' +
                        '<div class="title-group">' +
                            '<h3 class="title' + (hasDetail ? ' clickable' : '') + '" title="' + (hasDetail ? 'Click for full details' : '') + '">' + escapeHtml(title) + '</h3>' +
                            (version ? '<p class="version">Version ' + escapeHtml(version) + '</p>' : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="divider"></div>' +
                    '<p class="description">' + escapeHtml(description) + '</p>' +
                    (describeUrl
                        ? '<p class="citation">' +
                            '<a href="' + escapeHtml(describeUrl) + '" target="_blank" rel="noopener">Get Agent Capabilities</a>' +
                          '</p>'
                        : '');

                if (hasDetail) {
                    var titleEl = article.querySelector(".title");
                    titleEl.addEventListener("click", function() { openModal(agentEntry, detail); });
                }
                return article;
            }

            function renderErrorCard(agentEntry, err) {
                var slug = agentEntry.name || "";
                var article = document.createElement("article");
                article.className = "card";
                article.innerHTML =
                    '<div class="card-header">' +
                        '<div class="icon ' + escapeHtml((ICON_MAP[slug] || DEFAULT_ICON).cls) + '">!</div>' +
                        '<div class="title-group">' +
                            '<h3 class="title">' + escapeHtml(toDisplayTitle(slug)) + '</h3>' +
                            '<p class="version">Unavailable</p>' +
                        '</div>' +
                    '</div>' +
                    '<div class="divider"></div>' +
                    '<p class="description">Could not load agent details: ' + escapeHtml(err && err.message ? err.message : String(err)) + '</p>' +
                    (agentEntry.describeUrl
                        ? '<p class="citation"><a href="' + escapeHtml(agentEntry.describeUrl) + '" target="_blank" rel="noopener">Get Agent Capabilities</a></p>'
                        : '');
                return article;
            }

            var container = document.getElementById("agent-cards");
            var statusEl = document.getElementById("agent-cards-status");

            function setStatus(msg) {
                if (!statusEl.isConnected) {
                    container.insertBefore(statusEl, container.firstChild);
                }
                statusEl.textContent = msg;
            }
            function clearStatus() {
                if (statusEl.isConnected) statusEl.remove();
            }

            // Build a lowercased haystack of searchable fields for one card.
            function buildSearchText(entry, detail) {
                var parts = [];
                var slug = (detail && detail.profile && detail.profile.name) || (entry && entry.name) || "";
                if (slug) {
                    parts.push(slug);                                    // vector_analysis_agent
                    parts.push(slug.replace(/_/g, " "));                 // vector analysis agent
                    parts.push(toDisplayTitle(slug));                    // VectorAnalysisAgent (matches what's shown)
                }
                if (detail && detail.profile) {
                    parts.push(detail.profile.description || "");
                    parts.push(detail.profile.agent_type || "");
                }
                if (detail && detail.skills) {
                    detail.skills.forEach(function(s) {
                        parts.push(s.name || "");
                        parts.push(s.description || "");
                        (s.tags || []).forEach(function(t) { parts.push(t); });
                        (s.supported_operations || []).forEach(function(op) { parts.push(op); });
                    });
                }
                return parts.join(" ").toLowerCase();
            }

            // Track slugs already in the grid to avoid duplicates across registrations.
            var renderedSlugs = Object.create(null);

            function appendAgentsFromCapabilities(caps) {
                var agents = (caps && caps.agents) || [];
                var fresh = agents.filter(function(a) {
                    var slug = a && a.name;
                    if (!slug || renderedSlugs[slug]) return false;
                    return true;
                });
                if (!fresh.length) {
                    return Promise.resolve({ added: 0, total: agents.length, duplicates: agents.length });
                }
                return Promise.all(fresh.map(function(a) {
                    return fetchJson(a.describeUrl)
                        .then(function(detail) { return { entry: a, detail: detail, err: null }; })
                        .catch(function(err) { return { entry: a, detail: null, err: err }; });
                })).then(function(results) {
                    clearStatus();
                    results.forEach(function(r) {
                        var card = r.err ? renderErrorCard(r.entry, r.err) : renderCard(r.entry, r.detail);
                        card.setAttribute("data-search", buildSearchText(r.entry, r.detail));
                        container.appendChild(card);
                        if (r.entry && r.entry.name) renderedSlugs[r.entry.name] = true;
                    });
                    applySearchFilter();
                    return { added: results.length, total: agents.length, duplicates: agents.length - fresh.length };
                });
            }

            function registerServer(url) {
                return fetchJson(url).then(appendAgentsFromCapabilities);
            }

            // ---- Initial load from the default GAS server ----
            registerServer(CAPABILITIES_URL).catch(function(err) {
                setStatus("Failed to load agent registry: " + (err && err.message ? err.message : String(err)));
            });

            // ---- Search filter ----
            var searchInput = document.getElementById("search-input");
            var emptyStateEl = null;
            function applySearchFilter() {
                var q = (searchInput.value || "").trim().toLowerCase();
                var cards = container.querySelectorAll(".card");
                var visible = 0;
                cards.forEach(function(card) {
                    var hay = card.getAttribute("data-search") || "";
                    var match = !q || hay.indexOf(q) !== -1;
                    card.style.display = match ? "" : "none";
                    if (match) visible++;
                });
                if (q && visible === 0 && cards.length > 0) {
                    if (!emptyStateEl) {
                        emptyStateEl = document.createElement("p");
                        emptyStateEl.className = "empty-state";
                        container.appendChild(emptyStateEl);
                    }
                    emptyStateEl.textContent = "No agents match “" + searchInput.value + "”.";
                } else if (emptyStateEl) {
                    emptyStateEl.remove();
                    emptyStateEl = null;
                }
            }
            searchInput.addEventListener("input", applySearchFilter);

            // ---- Register modal ----
            var registerBtn = document.getElementById("register-btn");
            registerBtn.addEventListener("click", openRegisterModal);

            function openRegisterModal() {
                var defaultUrl = "https://www.geospatial-agentic-services.online/?SERVICE=GAS&VERSION=1.0.0&REQUEST=GetCapabilities";
                modalContent.innerHTML =
                    '<button class="modal-close" type="button" aria-label="Close">×</button>' +
                    '<h2 class="modal-title">Register GAS Server</h2>' +
                    '<p class="modal-meta">Enter the GetCapabilities URL of a GAS server. We’ll fetch every agent it publishes and add them to the catalog below.</p>' +
                    '<form id="register-form" novalidate>' +
                        '<div class="form-row">' +
                            '<label class="form-label" for="register-url-input">GetCapabilities URL</label>' +
                            '<input id="register-url-input" class="form-input" type="url" required ' +
                                'placeholder="https://example.com/?SERVICE=GAS&VERSION=1.0.0&REQUEST=GetCapabilities" ' +
                                'value="' + escapeHtml(defaultUrl) + '">' +
                            <!-- '<p class="form-hint">The server must allow cross-origin requests (CORS) or be on the same origin as this page.</p>' + -->
                        '</div>' +
                        '<div id="register-status" class="form-status"></div>' +
                        '<div class="form-actions">' +
                            '<button type="button" id="register-cancel" class="secondary-btn">Cancel</button>' +
                            '<button type="submit" id="register-submit" class="primary-btn">Register</button>' +
                        '</div>' +
                    '</form>';

                modalContent.querySelector(".modal-close").addEventListener("click", closeModal);
                modalContent.querySelector("#register-cancel").addEventListener("click", closeModal);
                modalContent.querySelector("#register-form").addEventListener("submit", handleRegisterSubmit);
                modalContent.scrollTop = 0;
                modalOverlay.classList.add("open");
                document.body.style.overflow = "hidden";
                setTimeout(function() {
                    var input = document.getElementById("register-url-input");
                    if (input) { input.focus(); input.select(); }
                }, 50);
            }

            function handleRegisterSubmit(e) {
                e.preventDefault();
                var input = document.getElementById("register-url-input");
                var statusBox = document.getElementById("register-status");
                var submitBtn = document.getElementById("register-submit");
                var url = (input.value || "").trim();
                if (!url) {
                    statusBox.className = "form-status error";
                    statusBox.textContent = "Please enter a URL.";
                    return;
                }

                statusBox.className = "form-status info";
                statusBox.textContent = "Fetching capabilities…";
                submitBtn.disabled = true;
                input.disabled = true;

                registerServer(url)
                    .then(function(result) {
                        var added = (result && result.added) || 0;
                        var dup = (result && result.duplicates) || 0;
                        statusBox.className = "form-status success";
                        if (added > 0) {
                            statusBox.textContent = "Registered. Added " + added + " agent" + (added === 1 ? "" : "s") +
                                (dup > 0 ? " (" + dup + " already in catalog)" : "") + ".";
                        } else if (dup > 0) {
                            statusBox.textContent = "All " + dup + " agent" + (dup === 1 ? "" : "s") + " from that server are already in the catalog.";
                        } else {
                            statusBox.textContent = "No agents found at that URL.";
                        }
                        setTimeout(closeModal, 900);
                    })
                    .catch(function(err) {
                        statusBox.className = "form-status error";
                        var msg = err && err.message ? err.message : String(err);
                        if (/failed to fetch/i.test(msg) || /network/i.test(msg)) {
                            msg += " — likely a CORS issue. The server must send Access-Control-Allow-Origin, or you must open this page from the same origin as the server.";
                        }
                        statusBox.textContent = msg;
                        submitBtn.disabled = false;
                        input.disabled = false;
                    });
            }
        })();
    </script>
 <p style="text-align: center; padding: 0 20px 40px; word-break: break-all;">

        </a>
    </p>
